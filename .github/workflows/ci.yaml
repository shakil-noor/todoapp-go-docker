name: Go & Docker Hub CI
on:
  push:
    branch: ["main"]

env:
  REGISTRY: docker.io
  IMAGE_NAME: sknur/todoapp-go-docker

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up GO
        uses: actions/setup-go@v5
        with:
          go-version: '1.26' # Match the project's Go version
          cache: 'true'

      - name: Install Dependencies
        uses: go mod download # download the GO dependencies at runner (runs-on: ubuntu-latest)

      - name: Run Lister / Vet
        uses: go vet ./...

      - name: Run Test
        uses: go test -v -race -covermod=atomic ./...

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME}}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: SET the metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY}}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short

      - name: Set up Docker BuildX
        uses: docker/setup-buildx-action@v3

      - name: Build and Push docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ id.meta.outputs.tags }}
          labels: ${{ id.meta.outputs.labels }}
          cache-from: type=gha





