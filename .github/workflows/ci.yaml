name: Go & Docker Hub CI
on:
  push:
    branches: ["main"]

env:
  REGISTRY: docker.io
  IMAGE_NAME: sknur/todoapp-go-docker

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up GO
        uses: actions/setup-go@v5
        with:
          go-version: '1.26' # Match the project's Go version
          cache: true

      - name: Install Dependencies
        run: go mod download # download the GO dependencies at runner (runs-on: ubuntu-latest)

      - name: Run Lister / Vet
        run: go vet ./...

      - name: Run Test
        run: go test -v -race -covermod=atomic ./...

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME}}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: SET the metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY}}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short

      - name: Set up Docker BuildX
        uses: docker/setup-buildx-action@v3

      - name: Build and Push docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


# go vet inspects your source code without running it (static analysis).
  # It looks for suspicious constructs that might compile successfully but are
  # almost certainly bugs or logic errors.

# The ./... argument tells Go to recursively check every package and file in your current directory and subdirectories.


