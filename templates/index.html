<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golang Todo App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5" style="max-width: 600px;">
    <div class="card shadow-sm p-4">
        <h1 class="text-center text-primary mb-4">Todo List</h1>

        <form action="/addTask" method="POST" class="d-flex mb-4">
            <input type="text" name="task" class="form-control me-2" placeholder="What needs to be done?" required>
            <button type="submit" class="btn btn-primary">Add Task</button>
        </form>

        <ul class="list-group">
            {{range .}}
            <li class="list-group-item d-flex justify-content-between align-items-center shadow-sm-hover">
                {{.}}
            </li>
            {{else}}
            <li class="list-group-item text-center text-muted py-3">
                No tasks yet! Add one above.
            </li>
            {{end}}
        </ul>
    </div>
</div>
</body>
</html>
